<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✨ Biodata App</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins', sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#bbf7d0,#22c55e);
}

/* CARD */
.card{
    width:90%;
    max-width:360px;
    padding:25px;
    border-radius:25px;
    background:rgba(255,255,255,0.25);
    backdrop-filter:blur(15px);
    box-shadow:0 15px 35px rgba(0,0,0,0.2);
    color:#065f46;
    animation:fade 0.5s ease;
}

@keyframes fade{
    from{opacity:0; transform:translateY(20px);}
    to{opacity:1; transform:translateY(0);}
}

/* MENU */
.menu{
    text-align:center;
}

.menu h1{
    font-size:22px;
    margin-bottom:10px;
}

.menu p{
    font-size:13px;
    opacity:0.8;
    margin-bottom:20px;
}

/* BUTTON */
.btn{
    width:100%;
    padding:12px;
    margin:8px 0;
    border:none;
    border-radius:25px;
    font-weight:500;
    cursor:pointer;
    transition:0.3s;
}

.btn-main{
    background:linear-gradient(90deg,#22c55e,#16a34a);
    color:white;
}

.btn-second{
    background:rgba(255,255,255,0.3);
    color:#065f46;
}

.btn:hover{
    transform:scale(1.05);
}

/* FORM */
.container{
    display:none;
}

.form h2{
    text-align:center;
    margin-bottom:20px;
}

/* INPUT */
.input-group{
    margin-bottom:16px;
}

.input-group label{
    font-size:13px;
    display:flex;
    align-items:center;
}

.input-group label span{
    margin-right:6px;
}

.input-group input,
.input-group textarea{
    width:100%;
    margin-top:6px;
    padding:10px 12px;
    border:none;
    border-radius:15px;
    outline:none;
    background:rgba(255,255,255,0.3);
    color:#065f46;
}

.input-group input:focus,
.input-group textarea:focus{
    box-shadow:0 0 10px rgba(6,95,70,0.8);
}

/* SUBMIT */
.submit{
    background:linear-gradient(90deg,#22c55e,#16a34a);
    color:white;
}

.back{
    background:rgba(255,255,255,0.3);
    color:#065f46;
}
</style>
</head>

<body>

<!-- MENU -->
<div class="card menu" id="menu">
    <h1>✨ Welcome ✨</h1>
    <p>Pilih menu favorit kamu 👇</p>

    <button class="btn btn-main" onclick="showForm()">📝 Isi Biodata</button>
    <button class="btn btn-second" onclick="alert('📁 Lampiran XAMPP')">💻 XAMPP</button>
    <button class="btn btn-second" onclick="alert('📂 Lampiran Laragon')">⚙️ Laragon</button>
</div>

<!-- FORM -->
<div class="card container" id="formContainer">
    <form class="form" id="biodataForm">

        <h2>FORM BIODATA</h2>

        <div class="input-group">
            <label><span>👤</span> Nama Lengkap</label>
            <input type="text" id="nama" placeholder="Masukkan nama" required>
        </div>

        <div class="input-group">
            <label><span>📧</span> Email</label>
            <input type="email" id="email" placeholder="Masukkan email" required>
        </div>

        <div class="input-group">
            <label><span>🎯</span> Hobi</label>
            <input type="text" id="hobi" placeholder="Masukkan hobi">
        </div>

        <button type="submit" class="btn submit">💾 Simpan</button>
        <button type="button" class="btn back" onclick="backMenu()">⬅️ Kembali</button>

    </form>
</div>

<script>
function showForm(){
    document.getElementById("menu").style.display="none";
    document.getElementById("formContainer").style.display="block";
}

function backMenu(){
    document.getElementById("menu").style.display="block";
    document.getElementById("formContainer").style.display="none";
}

document.getElementById("biodataForm").addEventListener("submit", function(e){
    e.preventDefault();

    const nama = document.getElementById("nama").value;
    const email = document.getElementById("email").value;

    if(nama === "" || email === ""){
        alert("⚠️ Nama & Email wajib diisi!");
        return;
    }

    alert("🎉 Data berhasil disimpan!");
});
</script>

</body>
</html>
